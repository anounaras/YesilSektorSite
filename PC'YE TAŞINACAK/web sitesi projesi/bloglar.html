<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>Kullanıcı Blogları - YTÜ Blog Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0e0f14;
      font-family: 'Poppins', sans-serif;
      color: #fff;
    }

    /* NAVBAR ÜSTÜ BOŞLUK — ÇAKIŞMAYI DÜZELTİR */
    .page-offset {
      height: 90px; 
      width: 100%;
    }

    /* BAŞLIK ANİMASYONU */
    @keyframes slideDown {
      0% {opacity: 0; transform: translateY(-30px);}
      100% {opacity: 1; transform: translateY(0);}
    }

    /* GENEL KISIM */
    .user-blog-section {
      width: 90%;
      margin: 20px auto 60px auto;
      display: flex;
      gap: 40px;
      animation: fadeIn 1s ease forwards;
      opacity: 0;
    }

    @keyframes fadeIn {
      to {opacity: 1;}
    }

    .user-blog-left h2 {
      margin-bottom: 20px;
      font-size: 28px;
      font-weight: 600;
      animation: slideDown 0.8s ease forwards;
      color: #4fc3f7;
      text-shadow: 0 0 10px rgba(79,195,247,0.3);
    }

    /* BLOG GRID */
    .user-blog-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 25px;
    }

    /* BLOG CARD */
    .blog-card {
      background: linear-gradient(145deg, #15161d, #0c0c11);
      border-radius: 14px;
      padding-bottom: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.45);
      transition: 0.35s;
      overflow: hidden;
      position: relative;
    }

    .blog-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.65);
    }

    .blog-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 14px 14px 0 0;
    }

    .blog-card h3 {
      padding: 15px 20px 0;
      font-size: 21px;
      color: #4fc3f7;
    }

    .blog-card p {
      padding: 10px 20px;
      color: #ddd;
      font-size: 14.5px;
      line-height: 1.6;
    }

    /* SAĞ TARAFTAKİ FORM */
    .user-blog-aside {
      width: 32%;
      min-width: 280px;
    }

    .user-blog-form {
      background: #15161d;
      padding: 25px;
      border-radius: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.45);
      position: sticky;
      top: 110px;
    }

    .user-blog-form h3 {
      margin-bottom: 15px;
      color: #4fc3f7;
      font-size: 22px;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      background: #0e0f14;
      border: 1px solid #333;
      border-radius: 8px;
      color: white;
      font-size: 15px;
      outline: none;
      transition: 0.25s;
    }

    input:focus, textarea:focus {
      border-color: #4fc3f7;
      box-shadow: 0 0 10px rgba(79,195,247,0.3);
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(45deg, #4fc3f7, #1976d2);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 17px;
      margin-top: 8px;
      cursor: pointer;
      transition: 0.3s;
      font-weight: 600;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(79,195,247,0.5);
    }

    /* FOOTER */
    footer {
      margin-top: 60px;
      background: #111217;
      color: #888;
      text-align: center;
      padding: 20px;
    }

    /* RESPONSIVE */
    @media(max-width: 900px) {
      .user-blog-section {
        flex-direction: column;
      }
      .user-blog-aside {
        width: 100%;
      }
    }
  </style>

  <script src="script.js" defer></script>
</head>

<body>

  <!-- NAVBAR OTOMATİK GELİYOR -->
  <div id="navbar"></div>
  <script src="include.js"></script>

  <!-- NAVBAR BOŞLUĞU (ÇAKIŞMA ENGELİ) -->
  <div class="page-offset"></div>

  <section class="user-blog-section">
    <div class="user-blog-left">
      <h2>Kullanıcı Blogları</h2>

      <div id="userBlogContainer" class="user-blog-container">
        <!-- JS ile blog kartları buraya gelecek -->
      </div>
    </div>

    <aside class="user-blog-aside">
      <div class="user-blog-form">
        <h3>Yeni Blog Yazısı</h3>
        <input id="postTitle" type="text" placeholder="Başlık">
        <input id="postImage" type="text" placeholder="Görsel URL (opsiyonel)">
        <textarea id="postContent" rows="6" placeholder="İçerik"></textarea>
        <button id="addPostBtn" class="btn">Yazıyı Ekle</button>
      </div>
    </aside>
  </section>

  <footer>© 2025 YTÜ Blog Hub</footer>

</body>
</html>
