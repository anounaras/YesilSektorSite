<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Giriş Yap - YTÜ Blog Hub</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top, #1a2330, #0e141a);
            height: 100vh;
            overflow: hidden;
        }

        /* Animasyonlu arka plan */
        .bg-animation {
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('https://i.imgur.com/7Xb8E4G.png');
            background-size: cover;
            opacity: 0.15;
            animation: moveBg 18s linear infinite alternate;
        }

        @keyframes moveBg {
            0% { transform: scale(1) translateY(0); }
            100% { transform: scale(1.2) translateY(-20px); }
        }

        /* Form Kutusu */
        .form-container {
            width: 380px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(14px);
            padding: 35px;
            border-radius: 18px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            text-align: center;
            position: absolute;
            left: 50%;
            top: 54%;
            transform: translate(-50%, -50%);
            animation: fadeIn 1s ease forwards;
            color: white;
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translate(-50%, -43%); }
            100% { opacity: 1; transform: translate(-50%, -50%); }
        }

        .form-container h2 {
            margin-bottom: 20px;
            font-weight: 600;
        }

        .form-container input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.15);
            color: white;
            font-size: 15px;
        }

        .form-container button {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border-radius: 10px;
            border: none;
            font-size: 15px;
            cursor: pointer;
            background: linear-gradient(45deg, #3fa9f5, #0e83ff);
            color: white;
            transition: 0.3s;
            font-weight: 600;
        }

        .form-container button:hover {
            transform: scale(1.04);
            box-shadow: 0 0 15px rgba(0,140,255,0.7);
        }

        /* Kayıt Ol Alanı */
        .register-box {
            margin-top: 18px;
            background: rgba(255,255,255,0.07);
            padding: 15px;
            border-radius: 12px;
            font-size: 14px;
            animation: fadeUp 0.8s ease forwards;
            opacity: 0;
        }

        @keyframes fadeUp {
            0% { transform: translateY(15px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .register-box a {
            color: #4fc3f7;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .register-box a:hover {
            color: white;
            text-shadow: 0 0 8px #4fc3f7;
        }

        footer {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            font-size: 13px;
            opacity: 0.6;
            color: #ccc;
        }
    </style>
</head>

<body>

    <div class="bg-animation"></div>

    <!-- NAVBAR BURAYA OTOMATİK GELECEK -->
    <div id="navbar"></div>
    <script src="include.js"></script>

    <div class="form-container">
        <h2>Giriş Yap</h2>

        <form>
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Şifre" required>
            <button type="submit">Giriş Yap</button>
        </form>

        <!-- PROFESYONEL KAYIT OL ALANI -->
        <div class="register-box">
            Hesabın yok mu?  
            <a href="register.html">Kayıt Ol</a>
        </div>
    </div>

    <footer>© 2025 YTÜ Blog Hub</footer>

</body>
</html>
