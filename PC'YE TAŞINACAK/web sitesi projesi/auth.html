<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>Giriş / Kayıt - YTÜ Blog Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<script src="script.js" defer></script>
<script src="auth.js" defer></script>

<body class="auth-body">

  <div class="auth-container">

    <div class="auth-box">
      <h2 id="authTitle">Giriş Yap</h2>

      <input type="email" id="authEmail" placeholder="E-mail">
      <input type="password" id="authPassword" placeholder="Şifre">
      <input type="text" id="authUsername" placeholder="Kullanıcı Adı" class="register-only">

      <button id="authSubmitBtn" class="btn auth-btn">Giriş Yap</button>

      <p class="auth-switch">
        Hesabın yok mu?
        <a id="switchToRegister" href="#">Kayıt ol</a>
      </p>
    </div>

  </div>

</body>
</html>
