<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<title>Parabolica</title>

<style>
/* --- GENEL SIFIRLAMA --- */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background-color: #001a11;
    color: #ffffff;
    font-family: 'Raleway', sans-serif;
    overflow-x: hidden;
}

/* --- NAVBAR (TEK VE DÜZELTİLMİŞ) --- */
.navbar {
    position: fixed;
    top: -120px;
    width: 100%;
    padding: 20px 0;
    background: #1b1b1b;
    z-index: 1000;
    transition: top 0.4s ease;
}

.nav-container {
    width: 85%;
    margin: auto;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
}

.logo {
    justify-self: center;
}

.logo img {
    width: 100px;
    height: auto;
}

.menu {
    display: flex;
    gap: 40px;
    justify-self: end;
}

.menu a {
    color: white;
    text-decoration: none;
    font-size: 16px;
    position: relative;
    font-weight: bold;
}

.menu a::after {
    content: "";
    position: absolute;
    width: 0%;
    height: 2px;
    background: #003724;
    left: 0;
    bottom: -6px;
    transition: 0.3s ease;
}

.menu a:hover::after {
    width: 100%;
}

.menu a:hover {
    color: yellowgreen;
}

/* --- HERO --- */
.hero-banner {
    height: 70vh;
    background: linear-gradient(rgba(0, 55, 36, 0.6), #001a11),
    url('https://f1chronicle.com/wp-content/uploads/2023/08/SI201412041203-scaled.jpg') center/cover;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.hero-banner h1 {
    font-size: clamp(3rem, 8vw, 6rem);
    letter-spacing: 10px;
}

/* --- CONTENT --- */
.content-section {
    max-width: 1100px;
    margin: -50px auto 50px;
    padding: 0 20px;
}

.main-card {
    background: #003724;
    border-radius: 30px;
    padding: 50px;
}

.grid-layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
    align-items: center;
}

.image-side img {
    width: 100%;
    border-radius: 20px;
}

/* --- FOOTER --- */
.footer-container {
    background: #1b1b1b;
    padding: 50px 20px;
    text-align: center;
    border-radius: 30px 30px 0 0;
    margin-top: 50px;
}

.footer-columns {
    display: flex;
    justify-content: center;
    gap: 80px;
    margin-top: 30px;
}

.col {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.col a {
    color: #ccc;
    text-decoration: none;
    font-size: 14px;
}

/* --- MOBİL --- */
@media (max-width: 768px) {
    /* Navbar ve Menü Düzenlemesi */
    .hero-banner{
    margin-top: 100px;
    
    }
    
    .nav-container {
        display: flex; /* Grid'den Flex'e dönerek sıkışmayı önler */
        flex-direction: column;
        gap: 15px;
        width: 100%;
        padding: 10px;
    }

    .logo {
        justify-self: auto;
    }

    .menu {
        justify-self: auto;
        gap: 10px;
        flex-wrap: wrap; /* Menü linkleri sığmazsa alt satıra geçer */
        justify-content: center;
    }

    .menu a {
        font-size: 13px;
        padding: 5px 8px;
    }

    /* Ana Başlık */
    #anayazi {
        font-size: 32px !important;
        margin-top: 180px !important;
        line-height: 1.2;
    }

    /* Hakkımızda Kutusu */
    .aboutusbox {
        width: 95% !important;
        height: auto !important;
        margin: 40px auto !important;
        padding: 40px 15px !important;
        border-radius: 30px !important;
    }

    .aboutusbox h1 {
        font-size: 30px !important;
        padding-top: 20px !important;
    }

    .aboutusbox pre {
        font-size: 14px !important;
        white-space: pre-wrap !important; /* Metni ekrana sığdırır */
        text-align: center;
    }

    .border-line { display: none; } /* Mobilde performansı korur */

    /* Etkinlik Kartları (Parabolica & Apex26) */
    .parabolicaanasayfa, .apex26anasayfa {
        width: 300px !important;
        height: 300px !important;
        margin: 20px auto !important; /* Soldaki 1000px boşluğu sıfırlar */
        position: static !important;
    }

    /* Footer (En Kritik Yer) */
    .footer-container {
        padding: 40px 20px !important;
        width: 100% !important;
        border-radius: 30px 30px 0 0 !important;
    }

    .footer-columns {
        flex-direction: column; /* Yan yana duran kolonları alt alta alır */
        align-items: center;
        text-align: center;
        gap: 40px !important; /* 120px boşluk mobilde çok fazlaydı */
    }

    .footer-logo {
        margin-bottom: 30px !important;
    }

    .col b {
        font-size: 18px;
    }

    /* Genel Boşluk Ayarı */
    .bosluk {
        height: 30px !important;
    }
}


</style>
</head>

<body class="parabolica">

<script>
const navbar = document.querySelector(".navbar");
let lastScroll = 0;

/* AÇILIŞ ANİMASYONU */
window.addEventListener("load", () => {
    setTimeout(() => {
        navbar.style.top = "0";
    }, 100);

    setTimeout(() => {
        navbar.style.top = "-120px";
    }, 1200);
});

/* SCROLL KONTROL */
window.addEventListener("scroll", () => {
    let currentScroll = window.scrollY;

    if (currentScroll > lastScroll) {
        navbar.style.top = "-120px";
    } else {
        navbar.style.top = "0";
    }

    lastScroll = currentScroll;
});
</script>

</body>
